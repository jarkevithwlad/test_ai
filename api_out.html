<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koda Chat</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #0f0f0f;
    --bg-2: #141414;
    --surface: #1a1a1a;
    --surface-2: #1e1e1e;
    --surface-3: #171717;
    --border: #2a2a2a;
    --border-2: #333333;
    --text: #e0e0e0;
    --text-2: #cccccc;
    --muted: #888888;
    --muted-2: #666666;
    --danger: #ff6b6b;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-2);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
}

.message {
    display: flex;
    gap: 16px;
    max-width: 85%;
}

.message.user {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.message.assistant {
    align-self: flex-start;
    width: 100%;
    max-width: 100%;
}

.avatar {
    padding: 6px 12px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    flex-shrink: 0;
    height: fit-content;
}

.message.user .avatar {
    background: var(--border);
    color: #ffffff;
}

.message.assistant .avatar {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border-2);
}

.message .bubble {
    padding: 0;
    line-height: 1.6;
    word-break: break-word;
    font-size: 15px;
    color: var(--text);
    width: 100%;
}

.message.user .bubble {
    background: var(--surface-2);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: #ffffff;
    white-space: pre-wrap;
    width: auto;
}

.assistant-stack {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.assistant-answer {
    width: 100%;
}

.assistant-answer.is-empty {
    display: none;
}

.message.assistant .bubble p,
.reasoning-body p {
    margin-bottom: 16px;
}

.message.assistant .bubble p:last-child,
.reasoning-body p:last-child {
    margin-bottom: 0;
}

.message.assistant .bubble ul,
.message.assistant .bubble ol,
.reasoning-body ul,
.reasoning-body ol {
    margin-left: 24px;
    margin-bottom: 16px;
}

.message.assistant .bubble code:not(.hljs):not(.katex *),
.reasoning-body code:not(.hljs):not(.katex *) {
    background: var(--surface);
    padding: 3px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 14px;
    border: 1px solid var(--border);
}

.code-wrapper {
    margin: 16px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-2);
    position: relative;
    overflow: hidden;
}

.code-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(20, 20, 20, 0.95);
    backdrop-filter: blur(4px);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
}

.lang-label {
    font-size: 12px;
    color: var(--muted-2);
    text-transform: uppercase;
    font-weight: 600;
}

.copy-btn {
    background: var(--surface-2);
    border: 1px solid var(--border-2);
    color: var(--text-2);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s;
}

.copy-btn:hover {
    background: var(--border);
    color: #ffffff;
}

.code-wrapper pre {
    margin: 0;
    padding: 16px;
    overflow-x: auto;
    font-size: 14px;
}

.hljs {
    background: transparent !important;
    padding: 0 !important;
}

.typing {
    display: flex;
    gap: 6px;
    padding: 12px 0;
}

.typing span {
    width: 6px;
    height: 6px;
    background: #555555;
    border-radius: 50%;
    animation: typing 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-6px); opacity: 1; }
}

.reasoning-box {
    display: none;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, #161616 0%, #121212 100%);
    border-radius: 12px;
    overflow: hidden;
}

.reasoning-box.visible {
    display: block;
}

.reasoning-toggle {
    width: 100%;
    border: 0;
    background: transparent;
    color: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    text-align: left;
}

.reasoning-toggle:hover {
    background: rgba(255, 255, 255, 0.025);
}

.reasoning-meta {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.reasoning-title {
    color: #f1f1f1;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
}

.reasoning-hint {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.2;
}

.reasoning-chevron {
    flex-shrink: 0;
    color: #a0a0a0;
    transition: transform 0.2s ease;
}

.reasoning-box:not(.collapsed) .reasoning-chevron {
    transform: rotate(180deg);
}

.reasoning-preview {
    display: none;
    padding: 0 14px 12px;
    color: #a8a8a8;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.reasoning-box.collapsed .reasoning-preview {
    display: block;
}

.reasoning-body {
    padding: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    color: #d5d5d5;
    font-size: 14px;
    line-height: 1.65;
}

.reasoning-box.collapsed .reasoning-body {
    display: none;
}

.reasoning-body pre {
    white-space: pre-wrap;
}

.input-area {
    padding: 24px;
    background: var(--bg);
    border-top: 1px solid var(--surface);
    display: flex;
    gap: 12px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    align-items: flex-end;
}

.input-area textarea {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: #ffffff;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 52px;
    max-height: 250px;
    line-height: 1.5;
    transition: border-color 0.2s;
}

.input-area textarea:focus {
    border-color: #444444;
}

.input-area button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: #ffffff;
    width: 52px;
    height: 52px;
    border-radius: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
}

.input-area button:hover:not(:disabled) {
    background: var(--border);
    border-color: #444444;
}

.input-area button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.input-area button svg {
    width: 20px;
    height: 20px;
}

.error {
    color: var(--danger);
    font-size: 14px;
    padding: 12px 24px;
    background: #1a0f0f;
    border-top: 1px solid #331a1a;
    text-align: center;
    position: fixed;
    bottom: 100px;
    left: 0;
    right: 0;
    z-index: 100;
}

.api-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
}

.api-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
}

.api-modal-dialog {
    position: relative;
    z-index: 1;
    width: min(100%, 560px);
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
}

.api-modal-dialog h2 {
    color: #ffffff;
    font-size: 20px;
    margin-bottom: 8px;
}

.api-modal-dialog p {
    color: #a0a0a0;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 16px;
}

.form-grid {
    display: grid;
    gap: 14px;
}

.form-field {
    display: grid;
    gap: 8px;
}

.form-field label {
    color: #b8b8b8;
    font-size: 13px;
    font-weight: 600;
}

.api-modal-dialog input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: #ffffff;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.api-modal-dialog input:focus {
    border-color: #444444;
}

.api-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 18px;
}

.api-modal-actions button {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: #ffffff;
    min-width: 120px;
    height: 44px;
    padding: 0 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    text-align: center;
    vertical-align: middle;
}

.api-modal-actions button:hover {
    background: var(--border);
    border-color: #444444;
}

.api-modal-actions .secondary-btn {
    background: transparent;
    color: #b0b0b0;
}

.api-modal-actions .secondary-btn:hover {
    background: rgba(255, 255, 255, 0.04);
}

.katex-display {
    overflow-x: auto;
    overflow-y: hidden;
    padding: 8px 2px;
}

.katex {
    font-size: 1.04em;
}

::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: #3a3a3a;
}

@media (max-width: 720px) {
    .chat {
        padding: 16px;
        gap: 18px;
    }

    .message {
        max-width: 100%;
        gap: 10px;
    }

    .input-area {
        padding: 16px;
    }

    .avatar {
        padding: 6px 10px;
        font-size: 12px;
    }

    .api-modal-dialog {
        padding: 18px;
    }
}
</style>
</head>
<body>

<div class="chat" id="chat"></div>

<div class="error" id="error" style="display:none;"></div>

<div class="api-modal" id="apiModal">
    <div class="api-modal-backdrop" id="apiModalBackdrop"></div>
    <div class="api-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="apiModalTitle">
        <h2 id="apiModalTitle">Настройки API</h2>
        <p>Укажите адрес API, ключ и модель. Значения сохраняются локально; если localStorage недоступен, настройки будут храниться только до перезагрузки страницы.</p>

        <div class="form-grid">
            <div class="form-field">
                <label for="apiUrlInput">API URL</label>
                <input
                    id="apiUrlInput"
                    type="text"
                    placeholder="https://example.com/v1/chat/completions"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <div class="form-field">
                <label for="apiKeyInput">API Key или полный Authorization</label>
                <input
                    id="apiKeyInput"
                    type="password"
                    placeholder="sk-... или Bearer sk-..."
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>

            <div class="form-field">
                <label for="modelInput">Model</label>
                <input
                    id="modelInput"
                    type="text"
                    placeholder="gpt-4o-mini"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
        </div>

        <div class="api-modal-actions">
            <button id="cancelApiBtn" class="secondary-btn" type="button">Отмена</button>
            <button id="saveApiBtn" type="button">Сохранить</button>
        </div>
    </div>
</div>

<div class="input-area">
    <button id="settingsBtn" type="button" title="Настройки API" aria-label="Настройки API">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 1-2 0 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 1 0-2 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 1 2 0 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c0 .38.14.74.4 1a1.65 1.65 0 0 1 0 2c-.26.26-.4.62-.4 1z"></path>
        </svg>
    </button>

    <textarea
        id="input"
        placeholder="Сообщение..."
        rows="1"
    ></textarea>

    <button id="send" disabled aria-label="Отправить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
    </button>
</div>

<script>
const memoryStorage = {};

function storageGet(key) {
    try {
        const value = localStorage.getItem(key);
        if (value !== null) return value;
    } catch (e) {}
    return memoryStorage[key] || '';
}

function storageSet(key, value) {
    memoryStorage[key] = value;
    try {
        localStorage.setItem(key, value);
    } catch (e) {}
}

function storageRemove(key) {
    delete memoryStorage[key];
    try {
        localStorage.removeItem(key);
    } catch (e) {}
}

marked.setOptions({
    gfm: true,
    breaks: true
});

const renderer = new marked.Renderer();

renderer.code = function(codeOrToken, language) {
    let code = '';
    let lang = '';

    if (typeof codeOrToken === 'object' && codeOrToken !== null) {
        code = codeOrToken.text || '';
        lang = codeOrToken.lang || 'text';
    } else {
        code = codeOrToken || '';
        lang = language || 'text';
    }

    const validLang = hljs.getLanguage(lang) ? lang : 'plaintext';
    const highlighted = hljs.highlight(code, { language: validLang }).value;
    const escapedCode = escapeHtml(code);

    return `
    <div class="code-wrapper">
        <div class="code-header">
            <span class="lang-label">${escapeHtml(lang || 'text')}</span>
            <button class="copy-btn" type="button">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                <span>Копировать</span>
            </button>
        </div>
        <pre><code class="hljs ${validLang}">${highlighted}</code></pre>
        <div class="raw-code" style="display: none;">${escapedCode}</div>
    </div>`;
};

marked.use({ renderer });

document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;

    const wrapper = btn.closest('.code-wrapper');
    const rawCode = wrapper.querySelector('.raw-code').textContent;

    try {
        await navigator.clipboard.writeText(rawCode);
        const span = btn.querySelector('span');
        const originalText = span.textContent;
        span.textContent = 'Скопировано!';
        setTimeout(() => {
            span.textContent = originalText;
        }, 2000);
    } catch (err) {
        console.error('Ошибка копирования:', err);
    }
});

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const settingsBtn = document.getElementById('settingsBtn');
const errorEl = document.getElementById('error');

const apiModalEl = document.getElementById('apiModal');
const apiModalBackdropEl = document.getElementById('apiModalBackdrop');
const apiUrlInputEl = document.getElementById('apiUrlInput');
const apiKeyInputEl = document.getElementById('apiKeyInput');
const modelInputEl = document.getElementById('modelInput');
const saveApiBtn = document.getElementById('saveApiBtn');
const cancelApiBtn = document.getElementById('cancelApiBtn');

let messages = [];
let isStreaming = false;

function escapeHtml(value = '') {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function getSavedApiUrl() {
    return (storageGet('koda_api_url') || '').trim();
}

function getSavedApiKey() {
    return (storageGet('koda_api_key') || '').trim();
}

function getSavedModel() {
    return (storageGet('koda_model') || 'koda-base').trim();
}

function hasRequiredSettings() {
    return Boolean(getSavedApiUrl() && getSavedApiKey());
}

function refreshSendState() {
    sendBtn.disabled = !inputEl.value.trim() || isStreaming;
}

function showApiModal() {
    apiUrlInputEl.value = getSavedApiUrl();
    apiKeyInputEl.value = getSavedApiKey();
    modelInputEl.value = getSavedModel() || 'koda-base';

    cancelApiBtn.style.display = hasRequiredSettings() ? 'inline-flex' : 'none';
    apiModalEl.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    requestAnimationFrame(() => {
        if (!apiUrlInputEl.value) apiUrlInputEl.focus();
        else if (!apiKeyInputEl.value) apiKeyInputEl.focus();
        else modelInputEl.focus();
    });
}

function hideApiModal() {
    apiModalEl.style.display = 'none';
    document.body.style.overflow = '';
}

function saveApiSettings() {
    const apiUrl = apiUrlInputEl.value.trim();
    const apiKey = apiKeyInputEl.value.trim();
    const model = modelInputEl.value.trim() || 'koda-base';

    if (!apiUrl) {
        showError('Введите API URL');
        apiUrlInputEl.focus();
        return;
    }

    if (!/^https?:\/\//i.test(apiUrl)) {
        showError('API URL должен начинаться с http:// или https://');
        apiUrlInputEl.focus();
        return;
    }

    if (!apiKey) {
        showError('Введите API key');
        apiKeyInputEl.focus();
        return;
    }

    storageSet('koda_api_url', apiUrl);
    storageSet('koda_api_key', apiKey);
    storageSet('koda_model', model);

    hideApiModal();
    inputEl.focus();
}

function getAuthorizationValue(rawValue) {
    const value = (rawValue || '').trim();
    if (!value) return '';
    if (/^Bearer\s+/i.test(value)) return value;
    return `Bearer ${value}`;
}

function showError(text) {
    errorEl.textContent = text;
    errorEl.style.display = 'block';
    clearTimeout(showError._timer);
    showError._timer = setTimeout(() => {
        errorEl.style.display = 'none';
    }, 5000);
}

function normalizeTextParts(value) {
    if (typeof value === 'string') return value;
    if (!Array.isArray(value)) return '';

    return value.map((part) => {
        if (typeof part === 'string') return part;
        if (typeof part?.text === 'string') return part.text;
        if (typeof part?.content === 'string') return part.content;
        if (Array.isArray(part?.content)) return normalizeTextParts(part.content);
        return '';
    }).join('');
}

function extractAssistantPayloadParts(payload) {
    const choice = payload?.choices?.[0];

    const contentCandidates = [
        choice?.delta?.content,
        choice?.delta?.text,
        choice?.message?.content,
        payload?.message?.content,
        payload?.output_text,
        payload?.response,
        payload?.content
    ];

    const reasoningCandidates = [
        choice?.delta?.reasoning_content,
        choice?.delta?.reasoning,
        choice?.message?.reasoning_content,
        choice?.message?.reasoning,
        payload?.reasoning_content,
        payload?.reasoning
    ];

    let content = '';
    let reasoning = '';

    for (const candidate of contentCandidates) {
        if (typeof candidate === 'string' && candidate) {
            content = candidate;
            break;
        }
        if (Array.isArray(candidate)) {
            const text = normalizeTextParts(candidate);
            if (text) {
                content = text;
                break;
            }
        }
    }

    for (const candidate of reasoningCandidates) {
        if (typeof candidate === 'string' && candidate) {
            reasoning = candidate;
            break;
        }
        if (Array.isArray(candidate)) {
            const text = normalizeTextParts(candidate);
            if (text) {
                reasoning = text;
                break;
            }
        }
    }

    if (!content && Array.isArray(payload?.output)) {
        const text = payload.output.map((item) => {
            if (typeof item?.content === 'string') return item.content;
            if (Array.isArray(item?.content)) return normalizeTextParts(item.content);
            return '';
        }).join('');
        if (text) content = text;
    }

    return { content, reasoning };
}

function formatErrorMessage(status, rawText) {
    let detail = rawText || '';

    try {
        const parsed = JSON.parse(rawText);
        detail =
            parsed?.detail ||
            parsed?.error?.message ||
            parsed?.message ||
            rawText;
    } catch (e) {}

    if (typeof detail === 'object') {
        detail = JSON.stringify(detail);
    }

    return `Ошибка ${status}: ${detail}`;
}

function addUserMessage(content) {
    const div = document.createElement('div');
    div.className = 'message user';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'User';

    div.appendChild(avatar);
    div.appendChild(bubble);

}

function createAssistantMessageShell() {
    const div = document.createElement('div');
    div.className = 'message assistant';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const stack = document.createElement('div');
    stack.className = 'assistant-stack';

    const reasoningBox = document.createElement('div');
    reasoningBox.className = 'reasoning-box collapsed';

    const toggle = document.createElement('button');
    toggle.className = 'reasoning-toggle';
    toggle.type = 'button';
    toggle.setAttribute('aria-expanded', 'false');

    const meta = document.createElement('div');
    meta.className = 'reasoning-meta';

    const title = document.createElement('div');
    title.className = 'reasoning-title';
    title.textContent = 'Размышления';

    const hint = document.createElement('div');
    hint.className = 'reasoning-hint';
    hint.textContent = 'Свёрнуто';

    meta.appendChild(title);
    meta.appendChild(hint);

    const chevron = document.createElement('div');
    chevron.className = 'reasoning-chevron';
    chevron.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    `;

    toggle.appendChild(meta);
    toggle.appendChild(chevron);

    const preview = document.createElement('div');
    preview.className = 'reasoning-preview';

    const body = document.createElement('div');
    body.className = 'reasoning-body';

    toggle.addEventListener('click', () => {
        const collapsed = reasoningBox.classList.toggle('collapsed');
        toggle.setAttribute('aria-expanded', String(!collapsed));
        hint.textContent = collapsed ? 'Свёрнуто' : 'Развёрнуто';
    });

    reasoningBox.appendChild(toggle);
    reasoningBox.appendChild(preview);
    reasoningBox.appendChild(body);

    const bubble = document.createElement('div');
    bubble.className = 'bubble assistant-answer is-empty';

    stack.appendChild(reasoningBox);
    stack.appendChild(bubble);

    div.appendChild(avatar);
    div.appendChild(stack);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;

    return {
        root: div,
        stack,
        bubble,
        reasoningBox,
        reasoningToggle: toggle,
        reasoningHint: hint,
        reasoningPreview: preview,
        reasoningBody: body
    };
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-msg';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(typing);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById('typing-msg');
    if (typing) typing.remove();
}

function scrollChatIfNearBottom() {
    const isNearBottom = chatEl.scrollHeight - chatEl.clientHeight <= chatEl.scrollTop + 120;
    if (isNearBottom) {
        chatEl.scrollTop = chatEl.scrollHeight;
    }
}

function normalizeMathDelimiters(text = '') {
    return String(text)
        .replace(/\\\\\[/g, '\\[')
        .replace(/\\\\\]/g, '\\]')
        .replace(/\\\\\(/g, '\\(')
        .replace(/\\\\\)/g, '\\)');
}

function protectMath(text = '') {
    const mathStore = [];
    let result = normalizeMathDelimiters(text);

    function stash(tex, displayMode) {
        const token = `@@MATH_${mathStore.length}@@`;
        mathStore.push({
            token,
            tex: tex,
            displayMode
        });
        return token;
    }

    result = result.replace(/\\\[((?:\\.|[\s\S])*?)\\\]/g, (_, tex) => `\n\n${stash(tex, true)}\n\n`);
    result = result.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => `\n\n${stash(tex, true)}\n\n`);
    result = result.replace(/\\\(((?:\\.|[\s\S])*?)\\\)/g, (_, tex) => stash(tex, false));

    result = result.replace(/(^|[^\\$])\$(?!\$)([^\s$](?:[^$\n]|\\\$)*?[^\s$])\$(?!\$)/g, (match, prefix, tex) => {
        return `${prefix}${stash(tex, false)}`;
    });

    return { text: result, mathStore };
}

function renderMarkdownWithMath(rawText = '') {
    const { text, mathStore } = protectMath(rawText);
    let html = marked.parse(text);

    if (window.katex && mathStore.length) {
        for (const item of mathStore) {
            let rendered = '';
            try {
                rendered = katex.renderToString(item.tex, {
                    displayMode: item.displayMode,
                    throwOnError: false,
                    strict: 'ignore',
                    trust: false
                });
            } catch (err) {
                rendered = `<code>${escapeHtml(item.tex)}</code>`;
            }
            html = html.split(item.token).join(rendered);
        }
    }

    return html;
}

function extractLastMeaningfulLine(text = '') {
    const lines = String(text)
        .replace(/\r/g, '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);

    if (!lines.length) return '';

    const lastLine = lines[lines.length - 1];
    if (lastLine.length <= 180) return lastLine;
    return `${lastLine.slice(0, 177)}...`;
}

function updateAssistantContent(view, fullContent) {
    if (!view) return;

    if (!fullContent.trim()) {
        view.bubble.classList.add('is-empty');
        view.bubble.innerHTML = '';
        return;
    }

    view.bubble.classList.remove('is-empty');
    view.bubble.innerHTML = renderMarkdownWithMath(fullContent);
    scrollChatIfNearBottom();
}

function updateAssistantReasoning(view, fullReasoning, isStreamingNow = false) {
    if (!view) return;

    const trimmed = (fullReasoning || '').trim();
    if (!trimmed) {
        view.reasoningBox.classList.remove('visible');
        view.reasoningBody.innerHTML = '';
        view.reasoningPreview.textContent = '';
        return;
    }

    view.reasoningBox.classList.add('visible');
    view.reasoningBody.innerHTML = renderMarkdownWithMath(fullReasoning);
    view.reasoningPreview.textContent = extractLastMeaningfulLine(fullReasoning);
    view.reasoningHint.textContent = view.reasoningBox.classList.contains('collapsed')
        ? (isStreamingNow ? 'Свёрнуто · обновляется' : 'Свёрнуто')
        : (isStreamingNow ? 'Развёрнуто · обновляется' : 'Развёрнуто');

    scrollChatIfNearBottom();
}

function parseSSEChunk(chunk, onData) {
    const events = chunk.split(/\n\n/);

    for (const eventBlock of events) {
        const lines = eventBlock.split(/\r?\n/);
        const dataLines = [];

        for (const line of lines) {
            if (line.startsWith('data:')) {
                dataLines.push(line.slice(5).trimStart());
            }
        }

        if (!dataLines.length) continue;

        const data = dataLines.join('\n').trim();
        if (!data || data === '[DONE]') continue;

        try {
            const parsed = JSON.parse(data);
            onData(parsed);
        } catch (e) {}
    }
}

async function readSSEStream(response, onData) {
    if (!response.body) return;

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split(/\n\n/);
        buffer = parts.pop() || '';

        for (const part of parts) {
            parseSSEChunk(part, onData);
        }
    }

    if (buffer.trim()) {
        parseSSEChunk(buffer, onData);
    }
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    const apiUrl = getSavedApiUrl();
    const apiKey = getSavedApiKey();

    if (!apiUrl || !apiKey) {
        showApiModal();
        return;
    }

    isStreaming = true;
    refreshSendState();

    inputEl.value = '';
    inputEl.style.height = 'auto';
    errorEl.style.display = 'none';

    messages.push({ role: 'user', content: text });
    addUserMessage(text);
    addTyping();

    const body = {
        model: getSavedModel() || 'koda-base',
        messages: messages,
        stream: true,
        max_tokens: parseInt(storageGet('koda_max_tokens') || '4000', 10),
        temperature: parseFloat(storageGet('koda_temperature') || '0.7'),
        top_p: parseFloat(storageGet('koda_top_p') || '1')
    };

    const headers = {
        'Content-Type': 'application/json',
        'Accept': 'text/event-stream, application/json',
        'Authorization': getAuthorizationValue(apiKey)
    };

    let assistantView = null;
    let fullContent = '';
    let fullReasoning = '';

    function ensureAssistantView() {
        if (!assistantView) {
            removeTyping();
            assistantView = createAssistantMessageShell();
        }
        return assistantView;
    }

    try {
        const response = await fetch(apiUrl, {
            method: 'POST',
            headers,
            body: JSON.stringify(body),
            signal: AbortSignal.timeout(300000)
        });

        if (!response.ok) {
            removeTyping();
            const errText = await response.text();
            throw new Error(formatErrorMessage(response.status, errText));
        }

        const contentType = (response.headers.get('content-type') || '').toLowerCase();

        if (contentType.includes('text/event-stream')) {
            await readSSEStream(response, (parsed) => {
                const { content, reasoning } = extractAssistantPayloadParts(parsed);

                if (reasoning) {
                    ensureAssistantView();
                    fullReasoning += reasoning;
                    updateAssistantReasoning(assistantView, fullReasoning, true);
                }

                if (content) {
                    ensureAssistantView();
                    fullContent += content;
                    updateAssistantContent(assistantView, fullContent);
                }
            });
        } else {
            const payload = await response.json();
            const { content, reasoning } = extractAssistantPayloadParts(payload);

            if (reasoning) {
                ensureAssistantView();
                fullReasoning = reasoning;
                updateAssistantReasoning(assistantView, fullReasoning, false);
            }

            if (content) {
                ensureAssistantView();
                fullContent = content;
                updateAssistantContent(assistantView, fullContent);
            } else {
                throw new Error('API вернул ответ без текста assistant-сообщения');
            }
        }

        if (!assistantView) {
            removeTyping();
        } else {
            updateAssistantReasoning(assistantView, fullReasoning, false);
            messages.push({
                role: 'assistant',
                content: fullContent,
                reasoning: fullReasoning || undefined
            });
        }

    } catch (err) {
        removeTyping();
        showError(err.message || 'Неизвестная ошибка');
    } finally {
        isStreaming = false;
        refreshSendState();
        inputEl.focus();
        chatEl.scrollTop = chatEl.scrollHeight;
    }
}

cancelApiBtn.addEventListener('click', () => {
    if (hasRequiredSettings()) hideApiModal();
});

apiModalBackdropEl.addEventListener('click', () => {
    if (hasRequiredSettings()) hideApiModal();
});

settingsBtn.addEventListener('click', showApiModal);

apiUrlInputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        apiKeyInputEl.focus();
    }
});

apiKeyInputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        modelInputEl.focus();
    }
});

modelInputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        saveApiSettings();
    }
});

inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 250) + 'px';
    refreshSendState();
});

inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isStreaming && inputEl.value.trim()) {
            sendMessage();
        }
    }
});

sendBtn.addEventListener('click', () => {
    if (!isStreaming && inputEl.value.trim()) {
        sendMessage();
    }
});

refreshSendState();

if (!hasRequiredSettings()) {
    showApiModal();
}
