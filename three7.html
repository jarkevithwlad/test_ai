<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - gpgpu - flocking</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			body {
				background-color: #1a1a1a;
				color: #ccc;
				margin: 0;
				overflow: hidden;
			}
			a { color: #08f; }

			/* ===== CARD ===== */
			#card-container {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				z-index: 100;
				perspective: 1200px;
				width: 760px;
				height: 440px;
			}

			#card {
				width: 100%;
				height: 100%;
				position: relative;
				transform-style: preserve-3d;
				transform: rotateY(0deg);
			}

			.card-face {
				position: absolute;
				width: 100%;
				height: 100%;
				backface-visibility: hidden;
				border-radius: 24px;
				padding: 40px 48px;
				box-sizing: border-box;
				background: rgba(30, 30, 30, 0.45);
				backdrop-filter: blur(18px);
				-webkit-backdrop-filter: blur(18px);
				border: 1px solid rgba(255,255,255,0.1);
				box-shadow: 0 8px 32px rgba(0,0,0,0.4);
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}

			.card-face-back {
				transform: rotateY(180deg);
			}

			.card-label {
				font-size: 12px;
				text-transform: uppercase;
				letter-spacing: 2px;
				color: rgba(255,255,255,0.45);
				margin-bottom: 8px;
			}

			.card-title {
				font-size: 36px;
				font-weight: 700;
				color: #fff;
				margin-bottom: 16px;
			}

			.card-body {
				font-size: 18px;
				color: rgba(255,255,255,0.7);
				line-height: 1.6;
				white-space: pre-line;
			}

			.card-footer {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.card-footer-text {
				font-size: 14px;
				color: rgba(255,255,255,0.35);
			}

			.card-dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				background: rgba(100,140,255,0.6);
			}

			/* ===== TIMELINE ===== */
			#timeline {
				position: fixed;
				bottom: 40px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				align-items: center;
				z-index: 100;
				gap: 0;
			}

			.timeline-btn {
				padding: 10px 20px;
				border-radius: 12px;
				border: 2px solid rgba(255,255,255,0.15);
				background: rgba(255,255,255,0.04);
				color: rgba(255,255,255,0.6);
				font-size: 13px;
				font-weight: 500;
				font-family: system-ui, sans-serif;
				cursor: pointer;
				transition: all 0.3s;
				display: flex;
				align-items: center;
				justify-content: center;
				backdrop-filter: blur(4px);
				white-space: nowrap;
			}

			.timeline-btn:hover {
				background: rgba(255,255,255,0.1);
				border-color: rgba(255,255,255,0.35);
				color: #fff;
			}

			.timeline-btn.active {
				background: rgba(100,140,255,0.3);
				border-color: rgba(100,140,255,0.6);
				color: #fff;
				box-shadow: 0 0 20px rgba(100,140,255,0.2);
			}

			.timeline-connector {
				width: 24px;
				height: 2px;
				background: rgba(255,255,255,0.08);
				transition: background 0.3s;
			}

			.timeline-connector.active {
				background: rgba(100,140,255,0.35);
			}
		</style>
	</head>
	<body>

		<!-- CARD -->
		<div id="card-container">
			<div id="card">
				<div class="card-face card-face-front">
					<div>
						<div class="card-label">Front</div>
						<div class="card-title">Загрузка...</div>
					</div>
					<div class="card-footer">
						<div class="card-footer-text">—</div>
						<div class="card-dot"></div>
					</div>
				</div>
				<div class="card-face card-face-back">
					<div>
						<div class="card-label">Back</div>
						<div class="card-title">Загрузка...</div>
					</div>
					<div class="card-footer">
						<div class="card-footer-text">—</div>
						<div class="card-dot"></div>
					</div>
				</div>
			</div>
		</div>

		<!-- TIMELINE -->
		<div id="timeline"></div>

		<!-- SHADERS -->
		<script id="fragmentShaderPosition" type="x-shader/x-fragment">
			uniform float time;
			uniform float delta;
			void main() {
				vec2 uv = gl_FragCoord.xy / resolution.xy;
				vec4 tmpPos = texture2D( texturePosition, uv );
				vec3 position = tmpPos.xyz;
				vec3 velocity = texture2D( textureVelocity, uv ).xyz;
				float phase = tmpPos.w;
				phase = mod( ( phase + delta +
					length( velocity.xz ) * delta * 3. +
					max( velocity.y, 0.0 ) * delta * 6. ), 62.83 );
				gl_FragColor = vec4( position + velocity * delta * 15. , phase );
			}
		</script>

		<script id="fragmentShaderVelocity" type="x-shader/x-fragment">
			uniform float time;
			uniform float testing;
			uniform float delta;
			uniform float separationDistance;
			uniform float alignmentDistance;
			uniform float cohesionDistance;
			uniform float freedomFactor;
			uniform vec3 predator;
			uniform float predatorActive;

			const float width = resolution.x;
			const float height = resolution.y;
			const float PI = 3.141592653589793;
			const float PI_2 = PI * 2.0;

			float zoneRadius = 40.0;
			float zoneRadiusSquared = 1600.0;
			float separationThresh = 0.45;
			float alignmentThresh = 0.65;

			const float UPPER_BOUNDS = BOUNDS;
			const float SPEED_LIMIT = 9.0;

			float rand( vec2 co ){ return fract( sin( dot( co.xy, vec2(12.9898,78.233) ) ) * 43758.5453 ); }

			void main() {
				zoneRadius = separationDistance + alignmentDistance + cohesionDistance;
				separationThresh = separationDistance / zoneRadius;
				alignmentThresh = ( separationDistance + alignmentDistance ) / zoneRadius;
				zoneRadiusSquared = zoneRadius * zoneRadius;

				vec2 uv = gl_FragCoord.xy / resolution.xy;
				vec3 birdPosition, birdVelocity;
				vec3 selfPosition = texture2D( texturePosition, uv ).xyz;
				vec3 selfVelocity = texture2D( textureVelocity, uv ).xyz;

				float dist;
				vec3 dir;
				float distSquared;
				vec3 velocity = selfVelocity;
				float limit = SPEED_LIMIT;

				// Predator (mouse) — full screen range, multi-frame effect
				dir = predator - selfPosition;
				dir.z = 0.;
				dist = length( dir );
				distSquared = dist * dist;

				float preyRadius = 250.0;
				float preyRadiusSq = preyRadius * preyRadius;

				if ( dist < preyRadius && predatorActive > 0.5 ) {
					float f = ( distSquared / preyRadiusSq - 1.0 ) * delta * 150.;
					velocity += normalize( dir ) * f;
					limit += 8.0;
				}

				// Soft boundary push (keeps birds in bounds but no center attraction)
				float boundSoft = 100.0;
				if ( selfPosition.x > UPPER_BOUNDS - boundSoft )
					velocity.x -= delta * 3.0;
				if ( selfPosition.x < -UPPER_BOUNDS + boundSoft )
					velocity.x += delta * 3.0;
				if ( selfPosition.y > UPPER_BOUNDS - boundSoft )
					velocity.y -= delta * 3.0;
				if ( selfPosition.y < -UPPER_BOUNDS + boundSoft )
					velocity.y += delta * 3.0;
				if ( selfPosition.z > UPPER_BOUNDS - boundSoft )
					velocity.z -= delta * 3.0;
				if ( selfPosition.z < -UPPER_BOUNDS + boundSoft )
					velocity.z += delta * 3.0;

				// Flocking rules
				for ( float y = 0.0; y < height; y++ ) {
					for ( float x = 0.0; x < width; x++ ) {
						vec2 ref = vec2( x + 0.5, y + 0.5 ) / resolution.xy;
						birdPosition = texture2D( texturePosition, ref ).xyz;
						dir = birdPosition - selfPosition;
						dist = length( dir );
						if ( dist < 0.0001 ) continue;
						distSquared = dist * dist;
						if ( distSquared > zoneRadiusSquared ) continue;

						float percent = distSquared / zoneRadiusSquared;

						if ( percent < separationThresh ) {
							float f = ( separationThresh / percent - 1.0 ) * delta;
							velocity -= normalize( dir ) * f;
						} else if ( percent < alignmentThresh ) {
							float threshDelta = alignmentThresh - separationThresh;
							float adjustedPercent = ( percent - separationThresh ) / threshDelta;
							birdVelocity = texture2D( textureVelocity, ref ).xyz;
							float f = ( 0.5 - cos( adjustedPercent * PI_2 ) * 0.5 + 0.5 ) * delta;
							velocity += normalize( birdVelocity ) * f;
						} else {
							float threshDelta = 1.0 - alignmentThresh;
							float adjustedPercent;
							if( threshDelta == 0. ) adjustedPercent = 1.;
							else adjustedPercent = ( percent - alignmentThresh ) / threshDelta;
							float f = ( 0.5 - ( cos( adjustedPercent * PI_2 ) * -0.5 + 0.5 ) ) * delta;
							velocity += normalize( dir ) * f;
						}
					}
				}

				// Speed limit
				if ( length( velocity ) > limit ) {
					velocity = normalize( velocity ) * limit;
				}

				gl_FragColor = vec4( velocity, 1.0 );
			}
		</script>

		<script type="x-shader/x-vertex" id="birdVS">
			attribute vec2 reference;
			attribute float birdVertex;
			attribute vec3 birdColor;
			uniform sampler2D texturePosition;
			uniform sampler2D textureVelocity;
			varying vec4 vColor;
			varying float z;
			uniform float time;
			void main() {
				vec4 tmpPos = texture2D( texturePosition, reference );
				vec3 pos = tmpPos.xyz;
				vec3 velocity = normalize(texture2D( textureVelocity, reference ).xyz);
				vec3 newPosition = position;
				if ( birdVertex == 4.0 || birdVertex == 7.0 ) {
					newPosition.y = sin( tmpPos.w ) * 5.;
				}
				newPosition = mat3( modelMatrix ) * newPosition;
				velocity.z *= -1.;
				float xz = length( velocity.xz );
				float xyz = 1.;
				float x = sqrt( 1. - velocity.y * velocity.y );
				float cosry = velocity.x / xz;
				float sinry = velocity.z / xz;
				float cosrz = x / xyz;
				float sinrz = velocity.y / xyz;
				mat3 maty = mat3( cosry, 0, -sinry, 0, 1, 0, sinry, 0, cosry );
				mat3 matz = mat3( cosrz, sinrz, 0, -sinrz, cosrz, 0, 0, 0, 1 );
				newPosition = maty * matz * newPosition;
				newPosition += pos;
				z = newPosition.z;
				vColor = vec4( birdColor, 1.0 );
				gl_Position = projectionMatrix * viewMatrix * vec4( newPosition, 1.0 );
			}
		</script>

		<script type="x-shader/x-fragment" id="birdFS">
			varying vec4 vColor;
			varying float z;
			uniform vec3 color;
			void main() {
				float z2 = 0.2 + ( 1000. - z ) / 1000. * vColor.x;
				gl_FragColor = vec4( z2, z2, z2, 1. );
			}
		</script>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
					"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';

			/* ===== TIMELINE DATA ===== */
			const timelineData = [
				{
					id: 0, label: 'Инициализация',
					front: { title: 'Инициализация', body: 'Запуск симуляции стаи. Птицы появляются в случайных точках пространства с нулевой скоростью.', sub: 'Фаза 1/5' },
					back:  { title: 'Настройки GPU', body: 'Resolution: 32×32\nКоличество птиц: 1024\nShader: GPGPU Compute', sub: 'Технические данные' }
				},
				{
					id: 1, label: 'Сепарация',
					front: { title: 'Сепарация', body: 'Птицы поддерживают минимальную дистанцию друг от друга, избегая столкновений.', sub: 'Правило 1/3' },
					back:  { title: 'Параметры', body: 'Дистанция: 20 ед.\nПорог: 0.45\nВлияние: линейное', sub: 'Формула' }
				},
				{
					id: 2, label: 'Выравнивание',
					front: { title: 'Выравнивание', body: 'Каждая птица ориентируется по направлению движения ближайших соседей.', sub: 'Правило 2/3' },
					back:  { title: 'Параметры', body: 'Дистанция: 20 ед.\nПорог: 0.65\nВектор: нормализованный', sub: 'Формула' }
				},
				{
					id: 3, label: 'Когезия',
					front: { title: 'Когезия', body: 'Птицы притягиваются к центру масс стаи, сохраняя групповое единство.', sub: 'Правило 3/3' },
					back:  { title: 'Параметры', body: 'Дистанция: 20 ед.\nПритяжение: косинусное\nЦентр: (0, 0, 0)', sub: 'Формула' }
				},
				{
					id: 4, label: 'Хищник',
					front: { title: 'Хищник', body: 'Стаин избегает хищника, разлетаясь радиусом 150 единиц от его позиции.', sub: 'Реакция на угрозу' },
					back:  { title: 'Параметры', body: 'Радиус: 150 ед.\nОтталкивание: квадратичное\nЛимит скорости: +5', sub: 'Формула' }
				}
			];

			/* ===== CARD STATE ===== */
			let currentIndex = 0;
			let currentRotation = 0;
			let isAnimating = false;
			let showingBack = false;

			const card = document.getElementById('card');
			const frontFace = document.querySelector('.card-face-front');
			const backFace = document.querySelector('.card-face-back');

			function updateCardContent(index) {
				const data = timelineData[index];
				frontFace.querySelector('.card-label').textContent = data.front.sub;
				frontFace.querySelector('.card-title').textContent = data.front.title;
				let frontBody = frontFace.querySelector('.card-body');
				if (!frontBody) {
					frontBody = document.createElement('div');
					frontBody.className = 'card-body';
					frontFace.insertBefore(frontBody, frontFace.querySelector('.card-footer'));
				}
				frontBody.textContent = data.front.body;

				backFace.querySelector('.card-label').textContent = data.back.sub;
				backFace.querySelector('.card-title').textContent = data.back.title;
				let backBody = backFace.querySelector('.card-body');
				if (!backBody) {
					backBody = document.createElement('div');
					backBody.className = 'card-body';
					backFace.insertBefore(backBody, backFace.querySelector('.card-footer'));
				}
				backBody.textContent = data.back.body;
			}

			function updateTimelineUI(index) {
				document.querySelectorAll('.timeline-btn').forEach((btn, i) => {
					btn.classList.toggle('active', i <= index);
				});
				document.querySelectorAll('.timeline-connector').forEach((conn, i) => {
					conn.classList.toggle('active', i < index);
				});
			}

			function goToCard(targetIndex) {
				if (isAnimating || targetIndex === currentIndex) return;

				const diff = targetIndex - currentIndex;
				const flipCount = Math.abs(diff);
				const direction = diff > 0 ? 1 : -1;

				const totalRotation = flipCount * 180 * direction;
				const newRotation = currentRotation + totalRotation;

				updateCardContent(targetIndex);

				isAnimating = true;

				card.style.transition = 'transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1)';
				card.style.transform = `rotateY(${newRotation}deg)`;

				card.addEventListener('transitionend', function onFlipEnd() {
					card.removeEventListener('transitionend', onFlipEnd);

					const normalized = ((newRotation % 360) + 360) % 360;
					showingBack = (normalized >= 90 && normalized < 270);

					currentRotation = showingBack ? 180 : 0;
					card.style.transition = 'none';
					card.style.transform = `rotateY(${currentRotation}deg)`;

					currentIndex = targetIndex;
					updateTimelineUI(currentIndex);
					isAnimating = false;
				});
			}

			/* ===== BUILD TIMELINE ===== */
			const timelineEl = document.getElementById('timeline');
			timelineData.forEach((item, i) => {
				if (i > 0) {
					const conn = document.createElement('div');
					conn.className = 'timeline-connector';
					conn.dataset.index = i;
					timelineEl.appendChild(conn);
				}
				const btn = document.createElement('button');
				btn.className = 'timeline-btn';
				btn.textContent = item.label;
				btn.dataset.index = i;
				btn.addEventListener('click', () => goToCard(i));
				timelineEl.appendChild(btn);
			});

			/* ===== THREE.JS ===== */
			const WIDTH = 32;
			const BIRDS = WIDTH * WIDTH;
			const BOUNDS = 800, BOUNDS_HALF = BOUNDS / 2;

			let camera, scene, renderer;
			let mouseX = 0, mouseY = 0;
			let windowHalfX = window.innerWidth / 2;
			let windowHalfY = window.innerHeight / 2;
			let last = performance.now();
			let gpuCompute, velocityVariable, positionVariable;
			let positionUniforms, velocityUniforms, birdUniforms;

			class BirdGeometry extends THREE.BufferGeometry {
				constructor() {
					super();
					const trianglesPerBird = 3;
					const triangles = BIRDS * trianglesPerBird;
					const points = triangles * 3;
					const vertices = new THREE.BufferAttribute( new Float32Array( points * 3 ), 3 );
					const birdColors = new THREE.BufferAttribute( new Float32Array( points * 3 ), 3 );
					const references = new THREE.BufferAttribute( new Float32Array( points * 2 ), 2 );
					const birdVertex = new THREE.BufferAttribute( new Float32Array( points ), 1 );
					this.setAttribute( 'position', vertices );
					this.setAttribute( 'birdColor', birdColors );
					this.setAttribute( 'reference', references );
					this.setAttribute( 'birdVertex', birdVertex );
					let v = 0;
					function verts_push() {
						for ( let i = 0; i < arguments.length; i ++ ) vertices.array[ v ++ ] = arguments[ i ];
					}
					const wingsSpan = 20;
					for ( let f = 0; f < BIRDS; f ++ ) {
						verts_push( 0, -0, -20, 0, 4, -20, 0, 0, 30 );
						verts_push( 0, 0, -15, -wingsSpan, 0, 0, 0, 0, 15 );
						verts_push( 0, 0, 15, wingsSpan, 0, 0, 0, 0, -15 );
					}
					for ( let vi = 0; vi < triangles * 3; vi ++ ) {
						const triangleIndex = ~~( vi / 3 );
						const birdIndex = ~~( triangleIndex / trianglesPerBird );
						const x = ( birdIndex % WIDTH ) / WIDTH;
						const y = ~~( birdIndex / WIDTH ) / WIDTH;
						const c = new THREE.Color( 0x666666 + ~~( vi / 9 ) / BIRDS * 0x666666 );
						birdColors.array[ vi * 3 + 0 ] = c.r;
						birdColors.array[ vi * 3 + 1 ] = c.g;
						birdColors.array[ vi * 3 + 2 ] = c.b;
						references.array[ vi * 2 ] = x;
						references.array[ vi * 2 + 1 ] = y;
						birdVertex.array[ vi ] = vi % 9;
					}
					this.scale( 0.2, 0.2, 0.2 );
				}
			}

			function init() {
				const container = document.createElement( 'div' );
				container.id = 'three-container';
				container.style.position = 'absolute';
				container.style.top = '0';
				container.style.left = '0';
				document.body.appendChild( container );

				camera = new THREE.PerspectiveCamera( 75, window.innerWidth / window.innerHeight, 1, 3000 );
				camera.position.z = 350;

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x1a1a1a );
				scene.fog = new THREE.Fog( 0x1a1a1a, 100, 1000 );

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				container.appendChild( renderer.domElement );

				initComputeRenderer();
				initBirds();

				container.addEventListener( 'pointermove', onPointerMove );
				window.addEventListener( 'resize', onWindowResize );

				updateCardContent(0);
			}

			function initComputeRenderer() {
				gpuCompute = new GPUComputationRenderer( WIDTH, WIDTH, renderer );
				const dtPosition = gpuCompute.createTexture();
				const dtVelocity = gpuCompute.createTexture();
				fillPositionTexture( dtPosition );
				fillVelocityTexture( dtVelocity );

				velocityVariable = gpuCompute.addVariable( 'textureVelocity', document.getElementById( 'fragmentShaderVelocity' ).textContent, dtVelocity );
				positionVariable = gpuCompute.addVariable( 'texturePosition', document.getElementById( 'fragmentShaderPosition' ).textContent, dtPosition );

				gpuCompute.setVariableDependencies( velocityVariable, [ positionVariable, velocityVariable ] );
				gpuCompute.setVariableDependencies( positionVariable, [ positionVariable, velocityVariable ] );

				positionUniforms = positionVariable.material.uniforms;
				velocityUniforms = velocityVariable.material.uniforms;

				positionUniforms['time'] = { value: 0.0 };
				positionUniforms['delta'] = { value: 0.0 };
				velocityUniforms['time'] = { value: 1.0 };
				velocityUniforms['delta'] = { value: 0.0 };
				velocityUniforms['testing'] = { value: 1.0 };
				velocityUniforms['separationDistance'] = { value: 1.0 };
				velocityUniforms['alignmentDistance'] = { value: 1.0 };
				velocityUniforms['cohesionDistance'] = { value: 1.0 };
				velocityUniforms['freedomFactor'] = { value: 1.0 };
				velocityUniforms['predator'] = { value: new THREE.Vector3( 9999, 9999, 0 ) };
				velocityUniforms['predatorActive'] = { value: 0.0 };
				velocityVariable.material.defines.BOUNDS = BOUNDS.toFixed( 2 );

				velocityVariable.wrapS = THREE.RepeatWrapping;
				velocityVariable.wrapT = THREE.RepeatWrapping;
				positionVariable.wrapS = THREE.RepeatWrapping;
				positionVariable.wrapT = THREE.RepeatWrapping;

				const error = gpuCompute.init();
				if ( error !== null ) console.error( error );
			}

			function initBirds() {
				const geometry = new BirdGeometry();
				birdUniforms = {
					'color': { value: new THREE.Color( 0xff2200 ) },
					'texturePosition': { value: null },
					'textureVelocity': { value: null },
					'time': { value: 1.0 },
					'delta': { value: 0.0 }
				};
				const material = new THREE.ShaderMaterial( {
					uniforms: birdUniforms,
					vertexShader: document.getElementById( 'birdVS' ).textContent,
					fragmentShader: document.getElementById( 'birdFS' ).textContent,
					side: THREE.DoubleSide
				} );
				const birdMesh = new THREE.Mesh( geometry, material );
				birdMesh.rotation.y = Math.PI / 2;
				birdMesh.matrixAutoUpdate = false;
				birdMesh.updateMatrix();
				scene.add( birdMesh );
			}

			function fillPositionTexture( texture ) {
				const a = texture.image.data;
				for ( let k = 0, kl = a.length; k < kl; k += 4 ) {
					a[k]   = Math.random() * BOUNDS - BOUNDS_HALF;
					a[k+1] = Math.random() * BOUNDS - BOUNDS_HALF;
					a[k+2] = (Math.random() - 0.5) * 200;   // keep Z near 0
					a[k+3] = 1;
				}
			}

			function fillVelocityTexture( texture ) {
				const a = texture.image.data;
				for ( let k = 0, kl = a.length; k < kl; k += 4 ) {
					a[k]   = (Math.random() - 0.5) * 10;
					a[k+1] = (Math.random() - 0.5) * 10;
					a[k+2] = (Math.random() - 0.5) * 5;
					a[k+3] = 1;
				}
			}

			function onWindowResize() {
				windowHalfX = window.innerWidth / 2;
				windowHalfY = window.innerHeight / 2;
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );
			}

			function onPointerMove( event ) {
				if ( event.isPrimary === false ) return;
				// Map mouse to world space (full bounds)
				const ndcX = (event.clientX / window.innerWidth) * 2 - 1;
				const ndcY = -(event.clientY / window.innerHeight) * 2 + 1;
				// Project to world space at z=0
				const predX = ndcX * BOUNDS_HALF * 1.2;
				const predY = ndcY * BOUNDS_HALF * 1.2;
				velocityUniforms['predator'].value.set( predX, predY, 0 );
				velocityUniforms['predatorActive'].value = 1.0;
			}

			function animate() { render(); }

			function render() {
				const now = performance.now();
				let delta = ( now - last ) / 1000;
				if ( delta > 1 ) delta = 1;
				last = now;

				positionUniforms['time'].value = now;
				positionUniforms['delta'].value = delta;
				velocityUniforms['time'].value = now;
				velocityUniforms['delta'].value = delta;
				birdUniforms['time'].value = now;
				birdUniforms['delta'].value = delta;

				gpuCompute.compute();

				birdUniforms['texturePosition'].value = gpuCompute.getCurrentRenderTarget( positionVariable ).texture;
				birdUniforms['textureVelocity'].value = gpuCompute.getCurrentRenderTarget( velocityVariable ).texture;

				renderer.render( scene, camera );
			}

			init();
		</script>
	</body>
</html>
