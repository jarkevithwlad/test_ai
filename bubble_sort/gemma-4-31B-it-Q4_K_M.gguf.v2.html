<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализация Сортировки Пузырьком</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --bar-color: #4ecca3;
            --compare-color: #ff4d4d;
            --swap-color: #f9d423;
            --sorted-color: #a29bfe;
            --text-color: #eeeeee;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Контейнер для столбцов */
        #visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            width: 80%;
            max-width: 800px;
            gap: 4px;
            padding: 20px;
            border-bottom: 2px solid #333;
        }

        /* Стили одного столбца */
        .bar {
            flex: 1;
            background-color: var(--bar-color);
            transition: height 0.2s ease, background-color 0.2s ease;
            border-radius: 4px 4px 0 0;
            position: relative;
        }

        /* Цвета состояний */
        .bar.comparing { background-color: var(--compare-color) !important; }
        .bar.swapping { background-color: var(--swap-color) !important; }
        .bar.sorted { background-color: var(--sorted-color) !important; }

        /* Панель управления */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--bar-color);
            border-radius: 8px;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover:not(:disabled) {
            background-color: var(--bar-color);
            color: var(--bg-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: var(--bar-color);
        }

        .label {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>Bubble Sort Visualizer</h1>

    <div id="visualizer"></div>

    <div class="controls">
        <button id="resetBtn">Создать новый массив</button>
        <div class="label">Скорость:</div>
        <input type="range" id="speed" min="10" max="500" value="100" step="10">
        <button id="sortBtn">Запустить сортировку</button>
    </div>

    <script>
        const visualizer = document.getElementById('visualizer');
        const resetBtn = document.getElementById('resetBtn');
        const sortBtn = document.getElementById('sortBtn');
        const speedInput = document.getElementById('speed');

        let array = [];
        const ARRAY_SIZE = 30;

        // Функция создания случайного массива
        function generateArray() {
            array = [];
            visualizer.innerHTML = '';
            for (let i = 0; i < ARRAY_SIZE; i++) {
                const value = Math.floor(Math.random() * 250) + 20; // Высота от 20 до 270px
                array.push(value);
                
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value}px`;
                bar.id = `bar-${i}`;
                visualizer.appendChild(bar);
            }
        }

        // Функция задержки для анимации
        function sleep() {
            // Инвертируем значение range, чтобы большее число = больше скорость (меньше задержка)
            const ms = 510 - speedInput.value; 
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Основной алгоритм сортировки пузырьком
        async function bubbleSort() {
            const bars = document.getElementsByClassName('bar');
            const n = array.length;

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n - i - 1; j++) {
                    // Подсвечиваем сравниваемые элементы
                    bars[j].classList.add('comparing');
                    bars[j + 1].classList.add('comparing');

                    await sleep();

                    if (array[j] > array[j + 1]) {
                        // Подсвечиваем обмен
                        bars[j].classList.add('swapping');
                        bars[j + 1].classList.add('swapping');

                        // Меняем значения в массиве
                        let temp = array[j];
                        array[j] = array[j + 1];
                        array[j + 1] = temp;

                        // Визуально меняем высоту
                        bars[j].style.height = `${array[j]}px`;
                        bars[j + 1].style.height = `${array[j + 1]}px`;

                        await sleep();
                        
                        bars[j].classList.remove('swapping');
                        bars[j + 1].classList.remove('swapping');
                    }

                    bars[j].classList.remove('comparing');
                    bars[j + 1].classList.remove('comparing');
                }
                // Помечаем последний элемент как отсортированный
                bars[n - i - 1].classList.add('sorted');
            }
        }

        // Обработчики событий
        resetBtn.addEventListener('click', () => {
            generateArray();
            sortBtn.disabled = false;
        });

        sortBtn.addEventListener('click', async () => {
            sortBtn.disabled = true;
            resetBtn.disabled = true;
            await bubbleSort();
            resetBtn.disabled = false;
        });

        // Инициализация при загрузке
        generateArray();
    </script>
</body>
</html>
