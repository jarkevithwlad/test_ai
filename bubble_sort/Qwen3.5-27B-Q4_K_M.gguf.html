<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Красивая Сортировка Пузырьком</title>
    <style>
        /* Основные стили страницы */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e; /* Темно-синий фон */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* Контейнер для столбиков */
        .container {
            display: flex;
            align-items: flex-end; /* Выравнивание по низу */
            justify-content: center;
            width: 80%;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Стили для каждого столбика */
        .bar {
            width: 25px;
            margin: 0 2px;
            background: linear-gradient(to top, #4cc9f0, #4361ee);
            border-radius: 5px 5px 0 0;
            transition: height 0.3s ease, background-color 0.3s ease; /* Плавная анимация */
            box-shadow: 0 0 10px rgba(67, 97, 238, 0.3);
        }

        /* Цвета для разных состояний сортировки */
        .bar.comparing {
            background: linear-gradient(to top, #f72585, #b5179e);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.6);
        }

        .bar.sorted {
            background: linear-gradient(to top, #06d6a0, #118ab2);
            box-shadow: 0 0 10px rgba(6, 214, 160, 0.5);
        }

        /* Кнопка управления */
        .controls {
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(45deg, #4361ee, #3a0ca3);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.6);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <h1>Сортировка Пузырьком</h1>

    <div class="container" id="container">
        <!-- Столбики будут созданы здесь через JS -->
    </div>

    <div class="controls">
        <button onclick="startSort()" id="sortBtn">Начать Сортировку</button>
    </div>

    <script>
        const container = document.getElementById('container');
        const sortBtn = document.getElementById('sortBtn');
        const amount = 30; // Количество столбиков
        let bars = []; // Массив для хранения элементов

        // Функция создания случайного массива столбиков
        function generateArray() {
            container.innerHTML = '';
            bars = [];
            sortBtn.disabled = false;
            sortBtn.innerText = "Начать Сортировку";
            
            for (let i = 0; i < amount; i++) {
                const value = Math.floor(Math.random() * 90) + 10; // Высота от 10 до 100
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value}%`;
                bar.setAttribute('data-value', value); // Сохраняем числовое значение в атрибуте
                container.appendChild(bar);
                bars.push(bar);
            }
        }

        // Функция задержки (чтобы мы могли видеть анимацию)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Асинхронная функция сортировки пузырьком
        async function startSort() {
            sortBtn.disabled = true;
            sortBtn.innerText = "Сортируем...";
            
            // Скорость анимации (чем меньше число, тем быстрее)
            const delay = 40; 

            for (let i = 0; i < bars.length; i++) {
                for (let j = 0; j < bars.length - i - 1; j++) {
                    
                    // Подсветка сравниваемых элементов
                    bars[j].classList.add('comparing');
                    bars[j+1].classList.add('comparing');
                    
                    await sleep(delay);

                    const val1 = parseInt(bars[j].getAttribute('data-value'));
                    const val2 = parseInt(bars[j+1].getAttribute('data-value'));

                    if (val1 > val2) {
                        // Обмен значениями (высотой)
                        bars[j].style.height = `${val2}%`;
                        bars[j+1].style.height = `${val1}%`;
                        
                        // Обмен атрибутами data-value
                        bars[j].setAttribute('data-value', val2);
                        bars[j+1].setAttribute('data-value', val1);
                    }

                    // Убираем подсветку
                    bars[j].classList.remove('comparing');
                    bars[j+1].classList.remove('comparing');
                }
                // Помечаем последний элемент как отсортированный
                bars[bars.length - i - 1].classList.add('sorted');
            }
            
            // Последний элемент тоже должен быть зеленым
            bars[0].classList.add('sorted');
            
            sortBtn.innerText = "Готово! Обновить";
            sortBtn.onclick = generateArray; // Меняем действие кнопки на перезагрузку
            sortBtn.disabled = false;
        }

        // Генерируем массив при загрузке страницы
        generateArray();

    </script>
</body>
</html>
